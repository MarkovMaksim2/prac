version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: vkr_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vkr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vkr_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vkr_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - backend_data:/app/uploads
      - backend_data:/app/reports
    ports:
      - "3433:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vkr_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecret
      ALGORITHM: HS256

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vkr_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - backend_data:/app/uploads
      - backend_data:/app/reports
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vkr_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecret
      ALGORITHM: HS256

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vkr_frontend
    ports:
      - "3434:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data: